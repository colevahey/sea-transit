<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080c0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="R(SEA)V Transit" />
  <meta name="description" content="Real-time Seattle transit arrivals" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/style.css" />

  <title>R(SEA)V Transit</title>
</head>
<body>
  <div id="app">

    <!-- ── Top Bar ──────────────────────────────────────────────────────── -->
    <div class="top-bar">
      <h1>R<span>(SEA)</span>V <span>Transit</span></h1>
      <button class="icon-btn" id="btn-theme" aria-label="Toggle theme">
        <!-- icon injected by app.js -->
      </button>
    </div>

    <!-- ── Search Bar ────────────────────────────────────────────────────── -->
    <div class="search-wrap">
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="stop-search"
          type="search"
          placeholder="Search stops…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- ── Main content ──────────────────────────────────────────────────── -->
    <main class="content">

      <!-- Nearby stops view -->
      <div id="view-nearby" class="view active">
        <div id="fav-panels-section" class="hidden">
          <p class="section-label">Favorites</p>
          <div id="fav-panels" class="fav-panels-scroll"></div>
        </div>
        <p class="section-label">Nearby Stops</p>
        <div id="stops-list" class="card-list">
          <div class="state-box">
            <div class="spinner"></div>
            <p>Finding stops near you…</p>
          </div>
        </div>
      </div>

      <!-- Stop detail / arrivals view -->
      <div id="view-detail" class="view">
        <div class="detail-header">
          <button class="back-btn" id="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
            Nearby
          </button>
          <span id="detail-stop-name" class="detail-stop-name"></span>
          <button class="icon-btn fav-btn" id="btn-favorite" aria-label="Save stop"></button>
        </div>
        <p class="section-label">Arrivals</p>
        <div class="card-list">
          <div class="glass-card" id="arrivals-list">
            <div class="state-box">
              <div class="spinner"></div>
              <p>Loading arrivals…</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings view -->
      <div id="view-settings" class="view">
        <p class="section-label" style="padding-top:4px">Favorite Stops</p>
        <div class="settings-group" id="favorites-section">
          <!-- rendered by JS -->
        </div>

        <p class="section-label">Settings</p>
        <div class="settings-group">
          <div class="glass-card">
            <div class="settings-row">
              <span class="settings-row-label">Data source</span>
              <span class="settings-row-value">Puget Sound OBA</span>
            </div>
            <div class="settings-row">
              <span class="settings-row-label">Version</span>
              <span class="settings-row-value">0.1.0</span>
            </div>
          </div>
        </div>

        <p class="section-label">About</p>
        <div class="settings-group">
          <div class="glass-card">
            <div class="settings-row">
              <span class="settings-row-label">Transit data</span>
              <span class="settings-row-value">OneBusAway</span>
            </div>
            <div class="settings-row">
              <span class="settings-row-label">Get an API key</span>
              <span class="settings-row-value">developer.onebusaway.org →</span>
            </div>
          </div>
        </div>
      </div>

    </main>

    <!-- ── Bottom Nav Bar ────────────────────────────────────────────────── -->
    <nav class="nav-bar" role="navigation">
      <button class="nav-item active" data-view="nearby" aria-label="Nearby">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        <span>Nearby</span>
      </button>

      <button class="nav-item" data-view="settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </button>
    </nav>

  </div>

  <script src="/js/app.js"></script>
</body>
</html>
