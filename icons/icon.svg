<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080c0a"/>

  <!-- All content shifted: right 14, up 31 to center bus body at (256,256) -->
  <g transform="translate(14, -31)">

  <!-- Subtle green glow behind bus -->
  <ellipse cx="256" cy="290" rx="190" ry="60" fill="rgba(34,197,94,0.07)"/>

  <!-- Bus body -->
  <rect x="72" y="168" width="340" height="196" rx="28" fill="#0f1f14"/>
  <rect x="72" y="168" width="340" height="196" rx="28" fill="none" stroke="#22c55e" stroke-width="6"/>

  <!-- Windshield (front, right side) -->
  <rect x="340" y="195" width="58" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="340" y="195" width="58" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>
  <!-- Windshield shine -->
  <line x1="350" y1="205" x2="350" y2="275" stroke="rgba(74,222,128,0.25)" stroke-width="6" stroke-linecap="round"/>

  <!-- Rear window (left side) -->
  <rect x="88" y="195" width="48" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="88" y="195" width="48" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <!-- Side windows (middle) -->
  <rect x="155" y="195" width="60" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="155" y="195" width="60" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <rect x="228" y="195" width="60" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="228" y="195" width="60" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <!-- Passenger silhouettes -->
  <!-- Rear window passenger -->
  <ellipse cx="112" cy="235" rx="10" ry="9" fill="#22c55e" opacity="0.35"/>
  <rect x="102" y="243" width="20" height="16" rx="5" fill="#22c55e" opacity="0.22"/>
  <!-- Side window 1 passenger -->
  <ellipse cx="185" cy="233" rx="11" ry="10" fill="#22c55e" opacity="0.30"/>
  <rect x="174" y="242" width="22" height="17" rx="5" fill="#22c55e" opacity="0.18"/>
  <!-- Side window 2 passenger -->
  <ellipse cx="258" cy="233" rx="11" ry="10" fill="#22c55e" opacity="0.30"/>
  <rect x="247" y="242" width="22" height="17" rx="5" fill="#22c55e" opacity="0.18"/>

  <!-- Destination sign strip (brighter, with text-like marks) -->
  <rect x="156" y="174" width="132" height="16" rx="4" fill="#22c55e" opacity="0.30"/>
  <rect x="163" y="178" width="44" height="3.5" rx="1.75" fill="#4ade80" opacity="0.75"/>
  <rect x="213" y="178" width="30" height="3.5" rx="1.75" fill="#4ade80" opacity="0.55"/>
  <rect x="249" y="178" width="18" height="3.5" rx="1.75" fill="#4ade80" opacity="0.40"/>
  <rect x="163" y="184" width="62" height="2" rx="1" fill="#4ade80" opacity="0.28"/>

  <!-- Undercarriage / skirt line -->
  <line x1="72" y1="338" x2="412" y2="338" stroke="#22c55e" stroke-width="3" opacity="0.4"/>

  <!-- Front bumper accent -->
  <rect x="398" y="310" width="18" height="28" rx="5" fill="#22c55e" opacity="0.6"/>

  <!-- Headlight glow -->
  <ellipse cx="403" cy="301" rx="22" ry="13" fill="rgba(74,222,128,0.28)"/>

  <!-- Headlight (front) -->
  <rect x="390" y="293" width="26" height="14" rx="4" fill="#4ade80"/>
  <rect x="390" y="293" width="26" height="14" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>

  <!-- Second accent light below headlight -->
  <rect x="392" y="312" width="18" height="8" rx="3" fill="#22c55e" opacity="0.65"/>

  <!-- Tail light (rear) -->
  <rect x="82" y="295" width="18" height="12" rx="4" fill="#22c55e" opacity="0.5"/>

  <!-- Wheels -->
  <!-- Rear wheel -->
  <circle cx="150" cy="364" r="42" fill="#0d1710" stroke="#22c55e" stroke-width="6"/>
  <circle cx="150" cy="364" r="22" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.5"/>
  <circle cx="150" cy="364" r="6" fill="#4ade80"/>

  <!-- Front wheel -->
  <circle cx="340" cy="364" r="42" fill="#0d1710" stroke="#22c55e" stroke-width="6"/>
  <circle cx="340" cy="364" r="22" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.5"/>
  <circle cx="340" cy="364" r="6" fill="#4ade80"/>

  <!-- Motion lines (wider, better opacity gradient) -->
  <line x1="52" y1="222" x2="26" y2="222" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
  <line x1="52" y1="240" x2="18" y2="240" stroke="#22c55e" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="52" y1="260" x2="8" y2="260" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.40"/>
  <line x1="52" y1="280" x2="22" y2="280" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.22"/>

  </g>
</svg>
