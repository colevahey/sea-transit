<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080c0a"/>

  <!-- Subtle green glow behind bus -->
  <ellipse cx="256" cy="290" rx="190" ry="60" fill="rgba(34,197,94,0.07)"/>

  <!-- Bus body -->
  <rect x="72" y="168" width="340" height="196" rx="28" fill="#0f1f14"/>
  <rect x="72" y="168" width="340" height="196" rx="28" fill="none" stroke="#22c55e" stroke-width="6"/>

  <!-- Windshield (front, right side) -->
  <rect x="340" y="195" width="58" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="340" y="195" width="58" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>
  <!-- Windshield shine -->
  <line x1="350" y1="205" x2="350" y2="275" stroke="rgba(74,222,128,0.25)" stroke-width="6" stroke-linecap="round"/>

  <!-- Rear window (left side) -->
  <rect x="88" y="195" width="48" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="88" y="195" width="48" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <!-- Side windows (middle) -->
  <rect x="155" y="195" width="60" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="155" y="195" width="60" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <rect x="228" y="195" width="60" height="90" rx="10" fill="#0a1a0f"/>
  <rect x="228" y="195" width="60" height="90" rx="10" fill="none" stroke="#22c55e" stroke-width="4"/>

  <!-- Destination sign strip -->
  <rect x="156" y="174" width="132" height="14" rx="4" fill="#22c55e" opacity="0.15"/>

  <!-- Undercarriage / skirt line -->
  <line x1="72" y1="338" x2="412" y2="338" stroke="#22c55e" stroke-width="3" opacity="0.4"/>

  <!-- Front bumper accent -->
  <rect x="398" y="310" width="18" height="28" rx="5" fill="#22c55e" opacity="0.6"/>

  <!-- Headlight (front) -->
  <rect x="390" y="295" width="26" height="12" rx="4" fill="#4ade80"/>
  <rect x="390" y="295" width="26" height="12" rx="4" fill="none" stroke="#22c55e" stroke-width="2"/>

  <!-- Tail light (rear) -->
  <rect x="82" y="295" width="18" height="12" rx="4" fill="#22c55e" opacity="0.5"/>

  <!-- Wheels -->
  <!-- Rear wheel -->
  <circle cx="150" cy="364" r="42" fill="#0d1710" stroke="#22c55e" stroke-width="6"/>
  <circle cx="150" cy="364" r="22" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.5"/>
  <circle cx="150" cy="364" r="6" fill="#4ade80"/>

  <!-- Front wheel -->
  <circle cx="340" cy="364" r="42" fill="#0d1710" stroke="#22c55e" stroke-width="6"/>
  <circle cx="340" cy="364" r="22" fill="none" stroke="#22c55e" stroke-width="4" opacity="0.5"/>
  <circle cx="340" cy="364" r="6" fill="#4ade80"/>

  <!-- Motion lines (speed effect, left side) -->
  <line x1="52" y1="240" x2="20" y2="240" stroke="#22c55e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="52" y1="260" x2="10" y2="260" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="52" y1="280" x2="24" y2="280" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
</svg>
